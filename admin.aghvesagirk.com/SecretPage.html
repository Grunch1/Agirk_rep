<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #008080;
      position: relative;
    }
    .content {
      text-align: center;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.2);
      background: #ffffff;
      width: 300px;
    }
    .content h2 {
      margin-bottom: 20px;
    }
    .logout-btn {
      background-color: #004d4d;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.3s ease;
    }
    .logout-btn:hover {
      background-color: #008080;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Redirecting...  !</h1>
    <p>This page is accessible only to logged-in users.</p>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <script>
    // Check if user is logged in
    window.onload = function() {
      var isLoggedIn = sessionStorage.getItem('isLoggedIn');
      if (isLoggedIn && isLoggedIn === 'true') {
        // User is logged in, redirect to admin page
        window.location.href = 'admin123.html#Actions';
      } else {
        // User is not logged in, redirect to login page
        window.location.href = 'Admin-ik.html';
      }
    };

    // Logout function
    function logout() {
      sessionStorage.removeItem('isLoggedIn');
      window.location.href = 'Admin-ik.html'; // Redirect to login page after logout
    }
  </script>
</body>
</html>
