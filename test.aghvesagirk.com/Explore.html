<!DOCTYPE html>
<html lang="en" class="no-js">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="explore.css" />

  <body>
    <header></header>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Load header
        fetch("Main/header.html")
          .then((response) => {
            if (!response.ok) {
              throw new Error("Network response was not ok");
            }
            return response.text();
          })
          .then((data) => {
            document.querySelector("header").innerHTML = data;
          })
          .catch((error) => {
            console.error("Error fetching the header:", error);
          });
      });
    </script>
    <div class="container-xxl">
      <div class="row">
        <div class="col-6">
          <a href="https://editions.byzantini.st/ChronicleME/#/Exploration/Map">
            <div class="explore">
              <p class="text">Map</p>
              <img style="width: 100%" src="Nkarner/Map.png" alt="" />
            </div>
          </a>
        </div>
        <div class="col-6">
          <a
            href="https://editions.byzantini.st/ChronicleME/#/Exploration/Timeline"
          >
            <p class="text">Timeline</p>
            <img style="width: 100%" src="Nkarner/Timeline.webp" alt="" />
          </a>
        </div>
      </div>
      <div class="row">
        <div class="col-6">
          <a
            href="https://editions.byzantini.st/ChronicleME/#/Exploration/Persons"
          >
            <p class="text">Persons</p>
            <img style="width: 100%" src="Nkarner/anonymous.jpg" alt="" />
          </a>
        </div>
      </div>
    </div>
